<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant Mebel Bintang Jaya</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">
      <div class="logo-circle">🛋️</div>
      <div>
        <h2>AI Assistant</h2>
        <p>Mebel Bintang Jaya</p>
        <span class="status">● Online • Siap membantu Anda</span>
      </div>
    </div>

    <div id="chat-box" class="chat-box"></div>

    <div class="input-area">
      <div class="input-wrapper">
        <input id="user-input" type="text" placeholder="Ketik jawaban kamu...">
        <small>Jawab: Sangat Setuju / Setuju / Netral / Tidak Setuju</small>
      </div>
      <button id="send-btn">➤ Kirim</button>
    </div>

    <div class="privacy-note">
      🛡️ Data Anda aman dan hanya digunakan untuk keperluan penelitian.
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
